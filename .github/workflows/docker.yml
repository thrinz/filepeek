name: docker

# Build a multi-arch image and publish it to GitHub Container Registry (ghcr.io),
# so anyone can `docker pull ghcr.io/thrinz/filepeek` (used by agentpeek's
# docker-compose as a companion viewer). Uses the built-in GITHUB_TOKEN.
on:
  push:
    branches: [main]      # publishes :main, :sha-<short>, :latest
    tags: ['v*']          # publishes :1.2.3, :1.2, :latest
  workflow_dispatch:       # manual "Run workflow" button

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/thrinz/filepeek (lowercase)

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push to ghcr
    steps:
      - uses: actions/checkout@v4

      # QEMU + Buildx give cross-arch builds on the amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
